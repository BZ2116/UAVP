# YOLO11n Lowlight Training Configuration
task: detect
# 使用 YOLO11n 的结构
model: yolo11n.pt

# -------------------------------
# 训练超参数
# -------------------------------
train:
  lr0: 0.01            # 初始学习率
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0

  # 数据增强：低光任务强化 V 变化
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4

  mosaic: 1.0
  close_mosaic: 10      # 关闭 mosaic
  copy_paste: 0.0
  mixup: 0.0

# AMP 混合精度在训练脚本中设置即可
